<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Syziege 지도</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
  html, body { height: 100%; margin: 0; }
  #map { height: 100%; background: #12141b; }
  .panel {
    position: absolute; z-index: 1000;
    background: rgba(20, 22, 30, 0.88); color: #e8eaf0;
    border: 1px solid #2a2e3a; border-radius: 10px;
    padding: 12px 14px; backdrop-filter: blur(6px);
    font-family: system-ui, -apple-system, sans-serif; font-size: 13px;
    box-shadow: 0 6px 24px rgba(0,0,0,.4);
  }
  #top { top: 10px; right: 10px; min-width: 190px; }
  #top h1 { margin: 0 0 10px; font-size: 15px; letter-spacing: .02em; }
  #top select {
    width: 100%; background: #232733; color: #e8eaf0;
    border: 1px solid #3a3f4e; border-radius: 6px; padding: 5px 8px; font: inherit;
  }
  .row { display: flex; justify-content: space-between; gap: 10px; margin-top: 8px; }
  .row .k { color: #8a90a0; }
  .row .v { font-variant-numeric: tabular-nums; }
  .clock { display: flex; align-items: center; gap: 8px; margin-top: 10px; }
  .clock .icon { font-size: 20px; }
  .clock .t { font-size: 20px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .clock .d { color: #8a90a0; font-size: 12px; }
  #players { margin-top: 6px; display: flex; flex-direction: column; gap: 2px; max-height: 240px; overflow-y: auto; }
  #players button {
    all: unset; display: flex; justify-content: space-between; gap: 8px;
    padding: 2px 4px; margin: 0 -4px; border-radius: 5px; cursor: pointer; font-size: 12.5px;
  }
  #players button:hover { background: rgba(255,215,94,.12); color: #ffd75e; }
  #players .pw { color: #6b7180; font-size: 11px; }
  hr.sep { border: 0; border-top: 1px solid #2a2e3a; margin: 10px 0; }
  .head { font-size: 11px; letter-spacing: .08em; color: #6b7180; text-transform: uppercase; }
  #legend { bottom: 10px; left: 10px; max-width: 240px; }
  #legend .item { display: flex; align-items: center; gap: 8px; margin-top: 5px; }
  #legend .sw { width: 13px; height: 13px; border-radius: 3px; flex: none; }
  #legend .empty { color: #6b7180; }
  .player-label { background: rgba(20,22,30,.85); color: #fff; border: none; box-shadow: none;
    font-family: system-ui, sans-serif; font-size: 12px; }
  .core-marker div { font-size: 18px; line-height: 18px; text-align: center;
    text-shadow: 0 0 3px #000, 0 0 3px #000; }
  #login { position: fixed; inset: 0; z-index: 2000; display: none;
    align-items: center; justify-content: center; background: rgba(10,11,15,.82); backdrop-filter: blur(4px); }
  #login.show { display: flex; }
  #loginCard { width: 300px; padding: 24px; background: #171a22; border: 1px solid #2a2e3a;
    border-radius: 14px; box-shadow: 0 12px 40px rgba(0,0,0,.5); }
  #loginCard h2 { margin: 0 0 4px; font-size: 18px; }
  #loginCard .sub { color: #8a90a0; font-size: 12px; margin-bottom: 16px; }
  #loginCard label { display: block; font-size: 12px; color: #8a90a0; margin: 10px 0 4px; }
  #loginCard input { width: 100%; box-sizing: border-box; background: #232733; color: #e8eaf0;
    border: 1px solid #3a3f4e; border-radius: 7px; padding: 8px 10px; font: inherit; }
  #loginCard input:focus-visible { outline: 2px solid var(--accent, #ffd75e); }
  #loginBtn { width: 100%; margin-top: 16px; padding: 9px; font: inherit; font-weight: 600;
    background: #ffd75e; color: #241f00; border: none; border-radius: 7px; cursor: pointer; }
  #loginBtn:hover { background: #ffe083; }
  #loginErr { color: #e88; font-size: 12px; margin-top: 10px; min-height: 15px; }
  #loginCard .tip { color: #6b7180; font-size: 11.5px; margin-top: 14px; line-height: 1.5; }
  #loginCard .tip code { background: #232733; padding: 1px 5px; border-radius: 4px;
    font-family: ui-monospace, Menlo, monospace; }
  #userbar { margin-top: 10px; display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  #userbar .who { color: #8a90a0; font-size: 12px; }
  #logout { background: #2b3040; color: #e8eaf0; border: 1px solid #3a3f4e; border-radius: 6px;
    padding: 3px 9px; cursor: pointer; font-size: 12px; }
  #logout:hover { background: #343b4e; }
</style>
</head>
<body>
<div id="map"></div>

<div id="login">
  <form id="loginCard" autocomplete="off">
    <h2>Syziege 지도 로그인</h2>
    <div class="sub">로그인하면 같은 국가원의 위치만 표시됩니다.</div>
    <label for="lname">아이디 (닉네임)</label>
    <input type="text" id="lname" autocomplete="username">
    <label for="lpass">비밀번호</label>
    <input type="password" id="lpass" autocomplete="current-password">
    <button type="submit" id="loginBtn">로그인</button>
    <div id="loginErr"></div>
    <div class="tip">비밀번호는 게임에서 <code>/webmap pw</code> 로 확인하세요.</div>
  </form>
</div>

<div class="panel" id="top">
  <h1>Syziege 지도</h1>
  <select id="world" aria-label="월드 선택"></select>
  <div class="clock">
    <span class="icon" id="weatherIcon">☀️</span>
    <span class="t" id="clock">--:--</span>
    <span class="d" id="day"></span>
  </div>
  <div class="row"><span class="k">좌표</span><span class="v" id="coords">-, -</span></div>
  <hr class="sep">
  <div class="head" id="playersHead">접속자</div>
  <div id="players"></div>
  <div id="userbar"><span class="who" id="who"></span><button id="logout">로그아웃</button></div>
</div>

<div class="panel" id="legend">
  <div class="head">지역</div>
  <div id="legendItems"><div class="item empty">등록된 지역이 없습니다</div></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="map-common.js"></script>
<script>
(function () {
  'use strict';
  var app = SyziegeMap.create({ interactiveRegions: false });

  // Weather + clock from /api/serverinfo.
  function fmtTime(ticks) {
    var mins = Math.floor(((ticks + 6000) % 24000) / 24000 * 1440);
    var hh = String(Math.floor(mins / 60)).padStart(2, '0');
    var mm = String(mins % 60).padStart(2, '0');
    return hh + ':' + mm;
  }
  var WEATHER = { clear: '☀️', rain: '🌧️', thunder: '⛈️' };
  function refreshInfo() {
    fetch('/api/serverinfo').then(function (r) { return r.json(); }).then(function (list) {
      var s = list.find(function (w) { return w.world === app.currentWorld(); });
      if (!s) { return; }
      var ticks = s.time;
      var night = ticks >= 12300 && ticks <= 23850;
      document.getElementById('clock').textContent = fmtTime(ticks);
      document.getElementById('day').textContent = 'Day ' + s.day;
      document.getElementById('weatherIcon').textContent =
        (WEATHER[s.weather] || '☀️') + (night ? '🌙' : '');
    }).catch(function () {});
  }
  app.onWorldChange(refreshInfo);
  refreshInfo();
  setInterval(refreshInfo, 3000);

  /* ---------- login ---------- */
  var loginEl = document.getElementById('login');
  var errEl = document.getElementById('loginErr');
  var whoEl = document.getElementById('who');

  function showLogin() {
    loginEl.classList.add('show');
    document.getElementById('lname').focus();
  }
  function hideLogin() { loginEl.classList.remove('show'); }

  // When the players API reports we're not authenticated, prompt for login.
  app.onAuthRequired(showLogin);

  fetch('/api/session').then(function (r) { return r.json(); }).then(function (s) {
    if (s.loggedIn) { whoEl.textContent = s.name; } else { showLogin(); }
  }).catch(function () {});

  document.getElementById('loginCard').addEventListener('submit', function (e) {
    e.preventDefault();
    errEl.textContent = '';
    var name = document.getElementById('lname').value.trim();
    var pass = document.getElementById('lpass').value;
    fetch('/api/login', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: name, password: pass })
    }).then(function (r) {
      return r.json().then(function (j) { return { ok: r.ok, body: j }; });
    }).then(function (res) {
      if (!res.ok) { errEl.textContent = res.body.error || '로그인에 실패했습니다.'; return; }
      whoEl.textContent = res.body.name;
      document.getElementById('lpass').value = '';
      hideLogin();
      app.refreshPlayers();
    }).catch(function () { errEl.textContent = '서버에 연결할 수 없습니다.'; });
  });

  document.getElementById('logout').onclick = function () {
    fetch('/api/logout', { method: 'POST' }).then(function () {
      whoEl.textContent = '';
      showLogin();
    });
  };
})();
</script>
</body>
</html>
