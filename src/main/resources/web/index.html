<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Syziege 지도</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
  html, body { height: 100%; margin: 0; }
  #map { height: 100%; background: #12141b; }
  .panel {
    position: absolute; z-index: 1000;
    background: rgba(20, 22, 30, 0.88); color: #e8eaf0;
    border: 1px solid #2a2e3a; border-radius: 10px;
    padding: 12px 14px; backdrop-filter: blur(6px);
    font-family: system-ui, -apple-system, sans-serif; font-size: 13px;
    box-shadow: 0 6px 24px rgba(0,0,0,.4);
  }
  #top { top: 10px; right: 10px; min-width: 190px; }
  #top h1 { margin: 0 0 10px; font-size: 15px; letter-spacing: .02em; }
  #top select {
    width: 100%; background: #232733; color: #e8eaf0;
    border: 1px solid #3a3f4e; border-radius: 6px; padding: 5px 8px; font: inherit;
  }
  .row { display: flex; justify-content: space-between; gap: 10px; margin-top: 8px; }
  .row .k { color: #8a90a0; }
  .row .v { font-variant-numeric: tabular-nums; }
  .clock { display: flex; align-items: center; gap: 8px; margin-top: 10px; }
  .clock .icon { font-size: 20px; }
  .clock .t { font-size: 20px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .clock .d { color: #8a90a0; font-size: 12px; }
  #players { margin-top: 6px; display: flex; flex-direction: column; gap: 2px; max-height: 240px; overflow-y: auto; }
  #players button {
    all: unset; display: flex; justify-content: space-between; gap: 8px;
    padding: 2px 4px; margin: 0 -4px; border-radius: 5px; cursor: pointer; font-size: 12.5px;
  }
  #players button:hover { background: rgba(255,215,94,.12); color: #ffd75e; }
  #players .pw { color: #6b7180; font-size: 11px; }
  hr.sep { border: 0; border-top: 1px solid #2a2e3a; margin: 10px 0; }
  .head { font-size: 11px; letter-spacing: .08em; color: #6b7180; text-transform: uppercase; }
  #legend { bottom: 10px; left: 10px; max-width: 240px; }
  #legend .item { display: flex; align-items: center; gap: 8px; margin-top: 5px; }
  #legend .sw { width: 13px; height: 13px; border-radius: 3px; flex: none; }
  #legend .empty { color: #6b7180; }
  .player-label { background: rgba(20,22,30,.85); color: #fff; border: none; box-shadow: none;
    font-family: system-ui, sans-serif; font-size: 12px; }
</style>
</head>
<body>
<div id="map"></div>

<div class="panel" id="top">
  <h1>Syziege 지도</h1>
  <select id="world" aria-label="월드 선택"></select>
  <div class="clock">
    <span class="icon" id="weatherIcon">☀️</span>
    <span class="t" id="clock">--:--</span>
    <span class="d" id="day"></span>
  </div>
  <div class="row"><span class="k">좌표</span><span class="v" id="coords">-, -</span></div>
  <hr class="sep">
  <div class="head" id="playersHead">접속자</div>
  <div id="players"></div>
</div>

<div class="panel" id="legend">
  <div class="head">지역</div>
  <div id="legendItems"><div class="item empty">등록된 지역이 없습니다</div></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="map-common.js"></script>
<script>
(function () {
  'use strict';
  var app = SyziegeMap.create({ interactiveRegions: false });

  // Weather + clock from /api/serverinfo.
  function fmtTime(ticks) {
    var mins = Math.floor(((ticks + 6000) % 24000) / 24000 * 1440);
    var hh = String(Math.floor(mins / 60)).padStart(2, '0');
    var mm = String(mins % 60).padStart(2, '0');
    return hh + ':' + mm;
  }
  var WEATHER = { clear: '☀️', rain: '🌧️', thunder: '⛈️' };
  function refreshInfo() {
    fetch('/api/serverinfo').then(function (r) { return r.json(); }).then(function (list) {
      var s = list.find(function (w) { return w.world === app.currentWorld(); });
      if (!s) { return; }
      var ticks = s.time;
      var night = ticks >= 12300 && ticks <= 23850;
      document.getElementById('clock').textContent = fmtTime(ticks);
      document.getElementById('day').textContent = 'Day ' + s.day;
      document.getElementById('weatherIcon').textContent =
        (WEATHER[s.weather] || '☀️') + (night ? '🌙' : '');
    }).catch(function () {});
  }
  app.onWorldChange(refreshInfo);
  refreshInfo();
  setInterval(refreshInfo, 3000);
})();
</script>
</body>
</html>
