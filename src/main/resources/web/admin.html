<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Syziege 관리자 지도</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
  html, body { height: 100%; margin: 0; }
  #map { height: 100%; background: #12141b; }
  .panel {
    position: absolute; z-index: 1000;
    background: rgba(20, 22, 30, 0.92); color: #e8eaf0;
    border: 1px solid #2a2e3a; border-radius: 10px;
    padding: 12px 14px; backdrop-filter: blur(6px);
    font-family: system-ui, -apple-system, sans-serif; font-size: 13px;
    box-shadow: 0 6px 24px rgba(0,0,0,.45);
  }
  #top { top: 10px; left: 10px; display: flex; align-items: center; gap: 10px; }
  #top h1 { margin: 0; font-size: 15px; }
  #top .tag { font-size: 11px; font-weight: 600; letter-spacing: .05em; color: #ffd75e;
    border: 1px solid rgba(255,215,94,.35); border-radius: 999px; padding: 2px 9px; }
  #top select { background: #232733; color: #e8eaf0; border: 1px solid #3a3f4e;
    border-radius: 6px; padding: 4px 8px; font: inherit; }
  #top #coords { color: #8a90a0; font-variant-numeric: tabular-nums; min-width: 90px; }

  #side { top: 10px; right: 10px; width: 250px; max-height: calc(100% - 20px); overflow-y: auto; }
  #side h2 { margin: 0 0 8px; font-size: 13px; letter-spacing: .04em; }
  .head { font-size: 11px; letter-spacing: .08em; color: #6b7180; text-transform: uppercase; margin: 14px 0 6px; }
  .keyrow { display: flex; gap: 6px; }
  .keyrow input { flex: 1; min-width: 0; }
  input, button { font: inherit; }
  input[type=text], input[type=password] {
    background: #232733; color: #e8eaf0; border: 1px solid #3a3f4e;
    border-radius: 6px; padding: 5px 8px;
  }
  button {
    background: #2b3040; color: #e8eaf0; border: 1px solid #3a3f4e;
    border-radius: 6px; padding: 5px 10px; cursor: pointer;
  }
  button:hover { background: #343b4e; }
  button.primary { background: #ffd75e; color: #241f00; border-color: #ffd75e; font-weight: 600; }
  button.primary:hover { background: #ffe083; }
  button.active { outline: 2px solid #ffd75e; }
  .typeitem { display: flex; align-items: center; gap: 8px; padding: 5px; border-radius: 7px;
    cursor: pointer; border: 1px solid transparent; }
  .typeitem:hover { background: rgba(255,255,255,.04); }
  .typeitem.sel { border-color: #ffd75e; background: rgba(255,215,94,.08); }
  .typeitem .sw { width: 14px; height: 14px; border-radius: 4px; flex: none; }
  .typeitem .nm { flex: 1; }
  .typeitem .cnt { color: #6b7180; font-size: 11px; }
  .typeitem .del { padding: 1px 7px; font-size: 12px; color: #d98; }
  .addrow { display: flex; gap: 6px; margin-top: 6px; align-items: center; }
  .addrow input[type=text] { flex: 1; min-width: 0; }
  input[type=color] { width: 30px; height: 30px; border: none; background: none; padding: 0; cursor: pointer; }
  .hint { color: #6b7180; font-size: 11.5px; margin-top: 6px; line-height: 1.5; }
  #paintBtn { width: 100%; margin-top: 8px; }
  .status { font-size: 11.5px; color: #8a90a0; margin-top: 8px; min-height: 14px; }
  .core-marker div { font-size: 18px; line-height: 18px; text-align: center;
    text-shadow: 0 0 3px #000, 0 0 3px #000; }
</style>
</head>
<body>
<div id="map"></div>

<div class="panel" id="top">
  <h1>Syziege</h1>
  <span class="tag">관리자</span>
  <select id="world" aria-label="월드 선택"></select>
  <span id="coords">-, -</span>
</div>

<div class="panel" id="side">
  <h2>지역 편집</h2>

  <div class="head">관리자 키</div>
  <div class="keyrow">
    <input type="password" id="key" placeholder="관리자 키 입력" autocomplete="off">
    <button id="saveKey">저장</button>
  </div>

  <div class="head">지역 종류</div>
  <div id="types"></div>
  <div class="addrow">
    <input type="text" id="newName" placeholder="새 지역 이름 (예: 스폰)">
    <input type="color" id="newColor" value="#e6b800">
    <button id="addType">추가</button>
  </div>

  <button id="paintBtn">🖌️ 지역 지정 모드: 꺼짐</button>
  <div class="hint">
    지역 종류를 고른 뒤 <b>지역 지정 모드</b>를 켜고 지도에서 드래그하면
    청크가 그 지역으로 지정됩니다. <b>지우개</b>를 고르면 지정이 해제됩니다.
  </div>
  <div class="status" id="status"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="map-common.js"></script>
<script>
(function () {
  'use strict';
  var app = SyziegeMap.create({ interactiveRegions: true });

  var ERASER = '__eraser__';
  var active = null;                 // active type id, ERASER, or null
  var keyInput = document.getElementById('key');
  var typesEl = document.getElementById('types');
  var statusEl = document.getElementById('status');
  var paintBtn = document.getElementById('paintBtn');
  var painting = false;

  keyInput.value = localStorage.getItem('syziege-admin-key') || '';
  document.getElementById('saveKey').onclick = function () {
    localStorage.setItem('syziege-admin-key', keyInput.value.trim());
    setStatus('키를 저장했습니다.');
  };

  function setStatus(msg, isError) {
    statusEl.textContent = msg || '';
    statusEl.style.color = isError ? '#e88' : '#8a90a0';
  }

  function post(path, body) {
    return fetch(path, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json',
                 'X-Admin-Key': (localStorage.getItem('syziege-admin-key') || '') },
      body: JSON.stringify(body)
    }).then(function (r) {
      if (r.status === 403) { throw new Error('관리자 키가 올바르지 않습니다.'); }
      if (!r.ok) { return r.json().then(function (j) { throw new Error(j.error || '요청 실패'); }); }
      return r.json();
    });
  }

  function renderTypes() {
    var data = app.regionData();
    var counts = {};
    var chunks = (data.claims && data.claims[app.currentWorld()]) || [];
    chunks.forEach(function (c) { counts[c.type] = (counts[c.type] || 0) + 1; });

    typesEl.innerHTML = '';

    // Eraser pseudo-type.
    typesEl.appendChild(typeRow({ id: ERASER, name: '지우개 (지정 해제)', color: 'transparent' },
      null, true));

    data.types.forEach(function (t) {
      typesEl.appendChild(typeRow(t, counts[t.id] || 0, false));
    });
    updatePreviewColor();
  }

  function typeRow(t, count, isEraser) {
    var row = document.createElement('div');
    row.className = 'typeitem' + (active === t.id ? ' sel' : '');
    var sw = isEraser
      ? '<span class="sw" style="border:1px dashed #6b7180"></span>'
      : '<span class="sw" style="background:' + t.color + '"></span>';
    row.innerHTML = sw + '<span class="nm">' + escapeHtml(t.name) + '</span>' +
      (isEraser ? '' : '<span class="cnt">' + count + '</span>' +
        '<button class="del" title="삭제">✕</button>');
    row.onclick = function (e) {
      if (e.target.classList.contains('del')) { return; }
      active = t.id;
      renderTypes();
    };
    if (!isEraser) {
      var del = row.querySelector('.del');
      del.onclick = function (e) {
        e.stopPropagation();
        if (!confirm('"' + t.name + '" 지역 종류와 지정된 청크를 모두 삭제할까요?')) { return; }
        post('/api/admin/types/delete', { id: t.id }).then(function (data) {
          app.refreshRegions();
          if (active === t.id) { active = null; }
          setStatus('삭제했습니다.');
        }).catch(function (err) { setStatus(err.message, true); });
      };
    }
    return row;
  }

  function updatePreviewColor() {
    if (active === ERASER) { app.setPreviewColor('#ff5555'); }
    else {
      var t = app.regionData().types.find(function (x) { return x.id === active; });
      app.setPreviewColor(t ? t.color : '#ffffff');
    }
  }

  document.getElementById('addType').onclick = function () {
    var name = document.getElementById('newName').value.trim();
    var color = document.getElementById('newColor').value;
    if (!name) { setStatus('지역 이름을 입력하세요.', true); return; }
    var id = name.toLowerCase().replace(/[^a-z0-9_-]+/g, '_') || ('t' + Date.now());
    post('/api/admin/types', { id: id, name: name, color: color }).then(function () {
      document.getElementById('newName').value = '';
      active = id;
      app.refreshRegions();
      setStatus('지역 종류를 추가했습니다.');
    }).catch(function (err) { setStatus(err.message, true); });
  };

  paintBtn.onclick = function () {
    painting = !painting;
    app.setPaintMode(painting);
    paintBtn.textContent = '🖌️ 지역 지정 모드: ' + (painting ? '켜짐' : '꺼짐');
    paintBtn.classList.toggle('active', painting);
  };

  app.onStroke(function (chunks) {
    if (active === null) { setStatus('먼저 지역 종류를 선택하세요.', true); return; }
    var type = active === ERASER ? null : active;
    post('/api/admin/claim', { world: app.currentWorld(), type: type, chunks: chunks })
      .then(function () {
        app.refreshRegions();
        setStatus(chunks.length + '개 청크를 ' + (type ? '지정' : '해제') + '했습니다.');
      }).catch(function (err) { setStatus(err.message, true); });
  });

  app.onWorldChange(renderTypes);
  // Re-render the type list whenever region data reloads.
  var origRefresh = app.refreshRegions;
  app.refreshRegions = function () { return origRefresh().then(function (d) { renderTypes(); return d; }); };
  app.refreshRegions();

  function escapeHtml(s) {
    return String(s).replace(/[&<>"]/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c];
    });
  }
})();
</script>
</body>
</html>
