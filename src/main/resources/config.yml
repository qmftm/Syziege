# Syziege 웹맵 설정
webmap:
  # 웹맵 활성화 여부
  enabled: true
  # 웹 서버 바인드 주소 (0.0.0.0 = 모든 인터페이스)
  bind: 0.0.0.0
  # 웹 서버 포트
  port: 8123
  # 웹으로 노출할 월드 목록 (비워두면 모든 월드)
  worlds: []
  # 타일 캐시 유지 시간(초). 리전 파일이 변경되면 이 시간이 지난 뒤 다시 렌더링됩니다.
  tile-cache-seconds: 30
  # 관리자 지도(/admin)에서 지역을 편집할 때 필요한 키.
  # 비워두면 서버 첫 실행 시 무작위로 생성되어 이 파일에 저장됩니다.
  # /syziege admin 명령으로 확인할 수 있습니다.
  admin-key: ''
