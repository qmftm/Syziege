# Syziege 웹맵 설정
webmap:
  # 웹맵 활성화 여부
  enabled: true
  # 웹 서버 바인드 주소 (0.0.0.0 = 모든 인터페이스)
  bind: 0.0.0.0
  # 웹 서버 포트
  port: 8123
  # 웹으로 노출할 월드 목록 (비워두면 모든 월드)
  worlds: []
  # 타일 캐시 유지 시간(초). 리전 파일이 변경되면 이 시간이 지난 뒤 다시 렌더링됩니다.
  tile-cache-seconds: 30
  # 관리자 지도(/admin)에서 지역을 편집할 때 필요한 키.
  # 비워두면 서버 첫 실행 시 무작위로 생성되어 이 파일에 저장됩니다.
  # /syziege admin 명령으로 확인할 수 있습니다.
  admin-key: ''

# 국가전쟁 점령 코어 설정
core:
  # 코어 최대 체력 (점령 시 이 값으로 초기화됩니다)
  max-health: 100
  # 코어를 한 번 때릴 때 감소하는 체력
  damage-per-hit: 5
  # 같은 플레이어의 연속 타격 최소 간격 (밀리초)
  hit-cooldown-ms: 400
  # 국가에 소속되어야만 코어를 점령할 수 있는지
  require-nation: true
  # 마지막 타격 후 이 시간이 지나면 체력이 회복되기 시작합니다 (초)
  regen-delay-seconds: 30
  # 회복이 시작되면 초당 회복되는 체력 (0이면 회복 없음)
  regen-per-second: 2
