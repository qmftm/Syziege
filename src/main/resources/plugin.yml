name: Syziege
version: '${project.version}'
main: com.syziege.SyziegePlugin
api-version: '1.18'
description: Nation war plugin with a built-in web map viewer
authors: [qmftm]

commands:
  syziege:
    description: Syziege admin command
    aliases: [szg]
    permission: syziege.admin
    usage: /<command> <render|status|admin> [world]
  국가:
    description: 국가 관리 명령어
    aliases: [nation, gukga]
    permission: syziege.nation
    usage: /<command> <생성|해체|초대|탈퇴|정보|목록>
  admin:
    description: 국가 강제 관리 명령어
    aliases: [syziegeadmin, sadmin]
    permission: syziege.admin
    usage: /<command> <국가삭제|강제탈퇴|setcore>
  webmap:
    description: 웹 지도 로그인 비밀번호 확인
    permission: syziege.webmap
    usage: /<command> [pw|변경 <비밀번호>|재설정]

permissions:
  syziege.admin:
    description: Access to Syziege admin commands
    default: op
  syziege.nation:
    description: Use the nation commands
    default: true
  syziege.webmap:
    description: View your web map login password
    default: true
